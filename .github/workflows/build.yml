name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Build Left Side
        uses: zmkfirmware/zmk-actions-toolkit-build@v1
        with:
          board: nice_nano_v2
          shield: sofle_left

      - name: Build Right Side
        uses: zmkfirmware/zmk-actions-toolkit-build@v1
        with:
          board: nice_nano_v2
          shield: sofle_right
